name: HA HAN Port Proxy
version: "1.0.9"
slug: han_port_proxy
description: "HAN Port Proxy with MQTT message generation and with full auto discovery"
startup: services
boot: auto
init: false

host_network: true

options:
  mqtt_host: "192.168.x.x"
  mqtt_prefix: "tibber"
  mqtt_rprefix: "rtibber"
  mqtt_port: "1883"
  mqtt_username: example
  mqtt_password: example
  device_name: "Power Grid Meter"
  device_id: "power_meter"

schema:
  mqtt_host: str
  mqtt_prefix: str
  mqtt_rprefix: str
  mqtt_port: str
  mqtt_username: str
  mqtt_password: str
  device_name: str
  device_id: str

arch:
  - aarch64
  - amd64
  - armv7
